# Multi-language build for the single-service deployment: this
# service's Root Directory is assiduous_dash/ (Python-only, no
# package.json), so Nixpacks' auto-detection alone won't provision
# Node — it's added explicitly here so the sibling ../senus-dashboard
# frontend can be built as part of the same image. The actual start
# command stays in Procfile, unchanged.

[phases.setup]
nixPkgs = ["python312", "nodejs_20"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "cd ../senus-dashboard && npm ci"
]

[phases.build]
cmds = [
    "cd ../senus-dashboard && npm run build"
]
